services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: athera-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./infra/qdrant/storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: athera-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./infra/ollama:/root/.ollama
    restart: unless-stopped
