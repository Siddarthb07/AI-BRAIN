services:
  # ── Vector Database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: jarvis-qdrant
    ports:
     - "6335:6333"
     - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo > /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jarvis-backend
    ports:
      - "8001:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=${OLLAMA_DOCKER_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - TTS_ENGINE=${TTS_ENGINE:-pyttsx3}
      - TTS_VOICE=${TTS_VOICE:-american_female}
      - TTS_ESPEAK_VOICE=${TTS_ESPEAK_VOICE:-en-us+f3}
      - IMAGE_ENABLED=${IMAGE_ENABLED:-true}
      - IMAGE_MODEL_ID=${IMAGE_MODEL_ID:-segmind/tiny-sd}
      - IMAGE_DEVICE=${IMAGE_DEVICE:-auto}
      - IMAGE_DEFAULT_STEPS=${IMAGE_DEFAULT_STEPS:-12}
      - IMAGE_MAX_STEPS=${IMAGE_MAX_STEPS:-20}
      - IMAGE_DEFAULT_SIZE=${IMAGE_DEFAULT_SIZE:-512}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8001/calendar/google/callback}
      - GOOGLE_FRONTEND_URL=${GOOGLE_FRONTEND_URL:-http://localhost:5050}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID:-primary}
      - GOOGLE_CALENDAR_SYNC_TTL=${GOOGLE_CALENDAR_SYNC_TTL:-300}
      - GOOGLE_CALENDAR_MAX_EVENTS=${GOOGLE_CALENDAR_MAX_EVENTS:-8}
    volumes:
      - ./backend:/app
      - backend_data:/app/data
      - whisper_cache:/root/.cache/whisper
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jarvis-frontend
    ports:
      - "5050:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  backend_data:
  whisper_cache:
  huggingface_cache:
